<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TAWAF ENGINE // MASJID AL-HARAM</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'JetBrains Mono',monospace;color:#E0E0E0;width:430px;height:932px;position:relative}

/* TOP BAR */
#top-bar{position:absolute;top:0;left:0;right:0;height:28px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;z-index:10}
#top-bar .title{font-size:8px;font-weight:500;letter-spacing:3px;color:#00FFFF;text-transform:uppercase}
#top-bar .status{display:flex;align-items:center;gap:6px;font-size:7px;color:#666;letter-spacing:1px;text-transform:uppercase}
#top-bar .status .dot{width:5px;height:5px;border-radius:50%;background:#00FF88;box-shadow:0 0 4px #00FF88}
#top-bar .status .dot.amber{background:#d4af37;box-shadow:0 0 4px #d4af37}

/* MAKKAH TIME BAR */
#time-bar{position:absolute;top:28px;left:0;right:0;height:18px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;z-index:10}
#time-bar .makkah-time{font-size:8px;color:#00FFFF;letter-spacing:1.5px;font-variant-numeric:tabular-nums}
#time-bar .next-prayer{font-size:7px;color:#666;letter-spacing:1px;text-transform:uppercase}

/* LEFT PANEL — BAYESIAN MODEL */
#left-panel{position:absolute;top:50px;left:6px;width:100px;z-index:10}
#left-panel .panel-header{font-size:7px;font-weight:700;letter-spacing:2.5px;color:#00FFFF;text-transform:uppercase;margin-bottom:6px}
.bayes-formula{font-size:7px;color:#666;line-height:1.6;letter-spacing:0.3px}
.bayes-formula .highlight{color:#00FFFF}
.bayes-formula .value{color:#00FF88;font-variant-numeric:tabular-nums}
.bayes-divider{width:90%;height:1px;background:#1a1a1a;margin:5px 0}
.bayes-metrics{font-size:7px;color:#666;line-height:1.7;letter-spacing:0.3px}
.bayes-metrics .label{color:#444;text-transform:uppercase;letter-spacing:1px}
.bayes-metrics .val{color:#E0E0E0;font-variant-numeric:tabular-nums}
.confidence-bar{display:flex;gap:1px;margin-top:3px}
.confidence-bar .seg{width:8px;height:3px;background:#1a1a1a}
.confidence-bar .seg.filled{background:#00FF88;box-shadow:0 0 2px #00FF88}

/* RIGHT PANEL — DEMOGRAPHICS */
#right-panel{position:absolute;top:50px;right:6px;width:100px;z-index:10;text-align:right}
#right-panel .panel-header{font-size:7px;font-weight:700;letter-spacing:2.5px;color:#00FFFF;text-transform:uppercase;margin-bottom:6px}
.demo-row{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-bottom:3px;font-size:7px;line-height:1.4}
.demo-row .dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.demo-row .name{color:#666;text-transform:uppercase;letter-spacing:0.5px}
.demo-row .pct{color:#E0E0E0;font-variant-numeric:tabular-nums;min-width:22px;text-align:right}
.demo-row .bar-bg{width:30px;height:2px;background:#111;position:relative;flex-shrink:0}
.demo-row .bar-fill{height:2px;position:absolute;left:0;top:0}

/* CENTER STATS OVERLAY */
#center-stats{position:absolute;top:50px;left:110px;right:110px;z-index:10;display:flex;justify-content:space-between}
.cstat{text-align:center}
.cstat .val{font-size:12px;font-weight:300;color:#00FF88;font-variant-numeric:tabular-nums}
.cstat .lbl{font-size:6px;color:#444;text-transform:uppercase;letter-spacing:1.5px;margin-top:1px}

/* PRAYER / PHASE INDICATOR */
#phase-indicator{position:absolute;top:80px;left:50%;transform:translateX(-50%);z-index:10;text-align:center}
#phase-indicator .phase-name{font-size:9px;font-weight:500;letter-spacing:3px;color:#d4af37;text-transform:uppercase}
#phase-indicator .phase-sub{font-size:7px;color:#444;letter-spacing:1px;margin-top:2px}

/* BOTTOM LEFT — EVENT LOG */
#event-log{position:absolute;bottom:60px;left:6px;width:170px;height:110px;z-index:10;overflow:hidden}
#event-log .panel-header{font-size:7px;font-weight:700;letter-spacing:2.5px;color:#00FFFF;text-transform:uppercase;margin-bottom:4px}
#event-log .log-entries{font-size:6.5px;color:#444;line-height:1.5;overflow:hidden;height:96px}
.log-entry{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-entry .timestamp{color:#333}
.log-entry .event-type{color:#00FFFF}
.log-entry .event-detail{color:#555}
.log-entry.circuit{color:#00FF88}
.log-entry.arrival{color:#555}
.log-entry.prayer{color:#d4af37}

/* BOTTOM RIGHT — DENSITY CHART */
#density-panel{position:absolute;bottom:60px;right:6px;width:140px;height:110px;z-index:10}
#density-panel .panel-header{font-size:7px;font-weight:700;letter-spacing:2.5px;color:#00FFFF;text-transform:uppercase;margin-bottom:4px}
#density-chart{width:135px;height:80px;background:transparent}

/* BOTTOM STATS BAR */
#bottom-bar{position:absolute;bottom:8px;left:0;right:0;z-index:10;display:flex;justify-content:space-around;padding:0 8px}
.bstat{text-align:center}
.bstat .val{font-size:10px;font-weight:300;color:#E0E0E0;font-variant-numeric:tabular-nums}
.bstat .lbl{font-size:6px;color:#333;text-transform:uppercase;letter-spacing:1.5px;margin-top:1px}

/* MAIN CANVAS */
canvas#c{position:absolute;top:0;left:0;z-index:1}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="top-bar">
  <div class="title">TAWAF ENGINE // MASJID AL-HARAM</div>
  <div class="status">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">LIVE</span>
  </div>
</div>

<!-- TIME BAR -->
<div id="time-bar">
  <div class="makkah-time" id="makkah-time">00:00:00</div>
  <div class="next-prayer" id="next-prayer">—</div>
</div>

<!-- LEFT PANEL: BAYESIAN MODEL -->
<div id="left-panel">
  <div class="panel-header">BAYESIAN MODEL</div>
  <div class="bayes-formula">
    <span class="highlight">P(H|D)</span> = <span class="highlight">P(D|H)</span> × <span class="highlight">P(H)</span> / <span class="highlight">P(D)</span>
  </div>
  <div class="bayes-divider"></div>
  <div class="bayes-metrics">
    <div><span class="label">P(H)   </span> <span class="val" id="b-prior">0.000</span></div>
    <div><span class="label">P(D|H) </span> <span class="val" id="b-likelihood">0.000</span></div>
    <div><span class="label">P(D)   </span> <span class="val" id="b-evidence">0.000</span></div>
    <div><span class="label">P(H|D) </span> <span class="val" id="b-posterior" style="color:#00FF88">0.000</span></div>
  </div>
  <div class="bayes-divider"></div>
  <div class="bayes-metrics">
    <div><span class="label">PRED   </span> <span class="val" id="b-predicted">0</span></div>
    <div><span class="label">ACTUAL </span> <span class="val" id="b-actual">0</span></div>
    <div><span class="label">ERR    </span> <span class="val" id="b-error">0%</span></div>
  </div>
  <div class="confidence-bar" id="conf-bar">
    <div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div>
    <div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div>
  </div>
</div>

<!-- RIGHT PANEL: DEMOGRAPHICS -->
<div id="right-panel">
  <div class="panel-header">DEMOGRAPHICS</div>
  <div id="demo-list"></div>
</div>

<!-- CENTER STATS -->
<div id="center-stats">
  <div class="cstat"><div class="val" id="s-agents">0</div><div class="lbl">AGENTS</div></div>
  <div class="cstat"><div class="val" id="s-capacity">0%</div><div class="lbl">CAPACITY</div></div>
  <div class="cstat"><div class="val" id="s-circuits">0</div><div class="lbl">TAWAF</div></div>
</div>

<!-- PHASE INDICATOR -->
<div id="phase-indicator">
  <div class="phase-name" id="phase-name">INITIALIZING</div>
  <div class="phase-sub" id="phase-sub"></div>
</div>

<!-- EVENT LOG -->
<div id="event-log">
  <div class="panel-header">EVENT STREAM</div>
  <div class="log-entries" id="log-entries"></div>
</div>

<!-- DENSITY CHART -->
<div id="density-panel">
  <div class="panel-header">CROWD DENSITY</div>
  <canvas id="density-chart" width="270" height="160"></canvas>
</div>

<!-- BOTTOM STATS -->
<div id="bottom-bar">
  <div class="bstat"><div class="val" id="s-circhr">0</div><div class="lbl">CIRC/HR</div></div>
  <div class="bstat"><div class="val" id="s-avgtime">0s</div><div class="lbl">AVG CIRC</div></div>
  <div class="bstat"><div class="val" id="s-density">0.0</div><div class="lbl">DENSITY</div></div>
  <div class="bstat"><div class="val" id="s-countdown">—</div><div class="lbl">NEXT SALAH</div></div>
</div>

<canvas id="c"></canvas>

<script>
// --- CONFIG ---
const W = 430, H = 932;
const CX = W / 2, CY = H / 2 + 10;
const KAABAH_SIZE = 36;
const MATAF_INNER = 42;
const MATAF_OUTER = 175;
const MAX_AGENTS = 3500;

// --- DEMOGRAPHICS ---
const TYPE_SOLO_M = 0, TYPE_SOLO_F = 1, TYPE_FAMILY = 2, TYPE_ELDERLY = 3, TYPE_TOUR = 4, TYPE_CHILD = 5;
const TYPE_WEIGHTS = [0.30, 0.15, 0.25, 0.10, 0.15, 0.05];
const TYPE_CUMULATIVE = [];
{ let s = 0; for (const w of TYPE_WEIGHTS) { s += w; TYPE_CUMULATIVE.push(s); } }

const TYPE_NAMES = ['SOLO M','SOLO F','FAMILY','ELDERLY','TOUR','CHILD'];
const TYPE_COLORS_CSS = ['#E0E0E0','#c8a8d8','#00FF88','#d4af37','#00BBFF','#FF8844'];

const TYPE_CONFIG = {
  [TYPE_SOLO_M]:  { speedMul: 1.3, sizeMin: 0.8, sizeMax: 1.2, ringMin: 0.25, ringMax: 0.95 },
  [TYPE_SOLO_F]:  { speedMul: 1.0, sizeMin: 0.7, sizeMax: 1.1, ringMin: 0.1,  ringMax: 0.7 },
  [TYPE_FAMILY]:  { speedMul: 0.55, sizeMin: 0.7, sizeMax: 1.1, ringMin: 0.05, ringMax: 0.5 },
  [TYPE_ELDERLY]: { speedMul: 0.25, sizeMin: 1.0, sizeMax: 1.4, ringMin: 0.0,  ringMax: 0.18 },
  [TYPE_TOUR]:    { speedMul: 0.7, sizeMin: 0.7, sizeMax: 1.0, ringMin: 0.2,  ringMax: 0.75 },
  [TYPE_CHILD]:   { speedMul: 0.8, sizeMin: 0.4, sizeMax: 0.6, ringMin: 0.05, ringMax: 0.5 },
};

function typeColor(type) {
  let r, g, b, a;
  const v = () => (Math.random() - 0.5) * 20;
  switch (type) {
    case TYPE_SOLO_M: r = 200+v(); g = 210+v(); b = 220+v(); a = 180+Math.random()*70; break;
    case TYPE_SOLO_F: r = 180+v(); g = 150+v(); b = 210+v(); a = 170+Math.random()*80; break;
    case TYPE_FAMILY: r = 0+v()*2;  g = 230+v(); b = 120+v(); a = 160+Math.random()*80; break;
    case TYPE_ELDERLY: r = 210+v(); g = 175+v(); b = 55+v();  a = 180+Math.random()*70; break;
    case TYPE_TOUR:   r = 0+v()*2;  g = 180+v(); b = 255+v(); a = 160+Math.random()*80; break;
    case TYPE_CHILD:  r = 255+v(); g = 136+v(); b = 68+v();  a = 150+Math.random()*80; break;
  }
  r = Math.max(0, Math.min(255, r)) | 0;
  g = Math.max(0, Math.min(255, g)) | 0;
  b = Math.max(0, Math.min(255, b)) | 0;
  a = Math.max(80, Math.min(255, a)) | 0;
  return (a << 24) | (b << 16) | (g << 8) | r;
}

function pickType() {
  const r = Math.random();
  for (let i = 0; i < TYPE_CUMULATIVE.length; i++) {
    if (r < TYPE_CUMULATIVE[i]) return i;
  }
  return TYPE_SOLO_M;
}

// --- CANVAS ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const trailCanvas = document.createElement('canvas');
trailCanvas.width = W; trailCanvas.height = H;
const tctx = trailCanvas.getContext('2d');
canvas.width = W; canvas.height = H;
canvas.style.width = W + 'px'; canvas.style.height = H + 'px';

// --- PRAYER TIMES ---
let prayerTimes = null;
let prayerSchedule = [];
let targetAgentCount = 1500;

async function fetchPrayerTimes() {
  try {
    const today = new Date();
    const dd = String(today.getDate()).padStart(2,'0');
    const mm = String(today.getMonth()+1).padStart(2,'0');
    const yyyy = today.getFullYear();
    const res = await fetch(`https://api.aladhan.com/v1/timingsByCity/${dd}-${mm}-${yyyy}?city=Makkah&country=Saudi+Arabia&method=4`);
    const data = await res.json();
    prayerTimes = data.data.timings;
  } catch(e) {
    prayerTimes = {Fajr:'05:13',Sunrise:'06:29',Dhuhr:'12:29',Asr:'15:53',Maghrib:'18:30',Isha:'20:30'};
  }
  buildSchedule();
}

function buildSchedule() {
  const names = ['Fajr','Dhuhr','Asr','Maghrib','Isha'];
  prayerSchedule = names.map(n => {
    const [h,m] = prayerTimes[n].split(':').map(Number);
    return {name: n, hour: h, min: m, totalMin: h*60+m};
  });
}

function getMakkahTime() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  return new Date(utc + 3 * 3600000);
}

function getCurrentPrayerInfo() {
  if (!prayerSchedule.length) return {current:'—',next:'—',nextIn:'',phase:'tawaf',target:1500};
  const makkah = getMakkahTime();
  const nowSec = (makkah.getHours() * 60 + makkah.getMinutes()) * 60 + makkah.getSeconds();

  for (let i = 0; i < prayerSchedule.length; i++) {
    const p = prayerSchedule[i];
    const pSec = p.totalMin * 60;
    const diff = nowSec - pSec;
    const ni = (i + 1) % prayerSchedule.length;
    const nSec = prayerSchedule[ni].totalMin * 60;
    const rem = nSec > nowSec ? nSec - nowSec : (86400 - nowSec + nSec);

    if (diff >= 0 && diff < 600) {
      return {current: p.name, next: prayerSchedule[ni].name, nextIn: formatTime(rem), phase:'prayer', target: 200};
    }
    if (diff >= 600 && diff < 1800) {
      const t = p.name === 'Fajr' ? 2000 : 3200;
      return {current: p.name, next: prayerSchedule[ni].name, nextIn: formatTime(rem), phase:'surge', target: t};
    }
  }

  let next = '—', nextIn = '';
  for (let i = 0; i < prayerSchedule.length; i++) {
    if (prayerSchedule[i].totalMin * 60 > nowSec) {
      next = prayerSchedule[i].name;
      nextIn = formatTime(prayerSchedule[i].totalMin * 60 - nowSec);
      break;
    }
  }
  if (next === '—') {
    next = prayerSchedule[0].name;
    nextIn = formatTime(86400 - nowSec + prayerSchedule[0].totalMin * 60);
  }

  const h = makkah.getHours();
  let target = 1800;
  if (h >= 2 && h < 4) target = 1200;
  else if (h >= 4 && h < 6) target = 1500;
  else if (h >= 22 || h < 2) target = 2200;
  else if (h >= 9 && h < 15) target = 2000;
  else if (h >= 6 && h < 9) target = 1600;

  return {current: '—', next, nextIn, phase:'tawaf', target};
}

function formatTime(sec) {
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60);
  const s = Math.floor(sec%60);
  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
  return `${m}m ${String(s).padStart(2,'0')}s`;
}

// --- AGENTS (SoA) ---
const ax = new Float32Array(MAX_AGENTS);
const ay = new Float32Array(MAX_AGENTS);
const avx = new Float32Array(MAX_AGENTS);
const avy = new Float32Array(MAX_AGENTS);
const aspeed = new Float32Array(MAX_AGENTS);
const asize = new Float32Array(MAX_AGENTS);
const acolor = new Uint32Array(MAX_AGENTS);
const acircuits = new Uint8Array(MAX_AGENTS);
const aangleAccum = new Float32Array(MAX_AGENTS);
const alastAngle = new Float32Array(MAX_AGENTS);
const atype = new Uint8Array(MAX_AGENTS);
const agroupId = new Int16Array(MAX_AGENTS);
const agroupLeader = new Int16Array(MAX_AGENTS);
const agroupOffX = new Float32Array(MAX_AGENTS);
const agroupOffY = new Float32Array(MAX_AGENTS);
let agentCount = 0;
let totalTawaf = 0;
let nextGroupId = 0;

// --- EVENT LOG ---
const eventLog = [];
const MAX_LOG = 18;
let logEl = null;

function addEvent(type, msg) {
  const makkah = getMakkahTime();
  const ts = makkah.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  eventLog.unshift({ts, type, msg});
  if (eventLog.length > MAX_LOG) eventLog.pop();
}

function renderLog() {
  if (!logEl) logEl = document.getElementById('log-entries');
  let html = '';
  for (const e of eventLog) {
    const cls = e.type === 'circuit' ? 'circuit' : e.type === 'prayer' ? 'prayer' : 'arrival';
    html += `<div class="log-entry ${cls}"><span class="timestamp">${e.ts}</span> <span class="event-type">${e.type.toUpperCase()}</span> ${e.msg}</div>`;
  }
  logEl.innerHTML = html;
}

// --- DENSITY HISTORY ---
const densityHistory = new Float32Array(135);
let densityIdx = 0;
let densityFull = false;

function recordDensity() {
  const d = agentCount / MAX_AGENTS;
  densityHistory[densityIdx] = d;
  densityIdx = (densityIdx + 1) % densityHistory.length;
  if (densityIdx === 0) densityFull = true;
}

function drawDensityChart() {
  const c = document.getElementById('density-chart');
  const cx = c.getContext('2d');
  const w = c.width, h = c.height;
  cx.clearRect(0, 0, w, h);

  // Grid lines
  cx.strokeStyle = '#111';
  cx.lineWidth = 0.5;
  for (let y = 0; y < h; y += h/4) {
    cx.beginPath(); cx.moveTo(0, y); cx.lineTo(w, y); cx.stroke();
  }

  const len = densityFull ? densityHistory.length : densityIdx;
  if (len < 2) return;

  // Find max for scaling
  let maxVal = 0;
  for (let i = 0; i < len; i++) maxVal = Math.max(maxVal, densityHistory[i]);
  maxVal = Math.max(maxVal, 0.1);

  // Draw line
  cx.beginPath();
  cx.strokeStyle = '#00FFFF';
  cx.lineWidth = 1;
  cx.shadowColor = '#00FFFF';
  cx.shadowBlur = 3;

  const startIdx = densityFull ? densityIdx : 0;
  for (let i = 0; i < len; i++) {
    const idx = (startIdx + i) % densityHistory.length;
    const x = (i / (len - 1)) * w;
    const y = h - (densityHistory[idx] / maxVal) * (h - 10) - 5;
    if (i === 0) cx.moveTo(x, y); else cx.lineTo(x, y);
  }
  cx.stroke();
  cx.shadowBlur = 0;

  // Fill underneath
  const lastX = w;
  const lastIdx = (startIdx + len - 1) % densityHistory.length;
  const lastY = h - (densityHistory[lastIdx] / maxVal) * (h - 10) - 5;
  cx.lineTo(lastX, h);
  cx.lineTo(0, h);
  cx.closePath();
  cx.fillStyle = 'rgba(0,255,255,0.03)';
  cx.fill();

  // Current value label
  const current = densityHistory[(densityIdx - 1 + densityHistory.length) % densityHistory.length];
  cx.fillStyle = '#00FFFF';
  cx.font = '9px JetBrains Mono';
  cx.textAlign = 'right';
  cx.fillText((current * 100).toFixed(0) + '%', w - 2, lastY - 4);
}

// --- CIRCUIT TRACKING ---
let circuitsThisMinute = 0;
let circuitsPerHour = 0;
let circuitTimes = [];
let lastCircuitReset = Date.now();

function spawnAgent(distributed, forceType, groupId, leaderIdx, offX, offY) {
  if (agentCount >= MAX_AGENTS) return -1;
  const i = agentCount++;
  const type = forceType !== undefined ? forceType : pickType();
  atype[i] = type;
  const cfg = TYPE_CONFIG[type];

  const range = MATAF_OUTER - MATAF_INNER;
  let ring;
  if (distributed) {
    const bandMin = MATAF_INNER + cfg.ringMin * range;
    const bandMax = MATAF_INNER + cfg.ringMax * range;
    const t = Math.pow(Math.random(), 1.8);
    ring = bandMin + t * (bandMax - bandMin);
  } else {
    const t = Math.pow(Math.random(), 1.8);
    ring = MATAF_INNER + 8 + t * (MATAF_OUTER - MATAF_INNER - 12);
  }
  const angle = Math.random() * Math.PI * 2;
  ax[i] = CX + Math.cos(angle) * ring;
  ay[i] = CY + Math.sin(angle) * ring;

  const baseSpeed = 0.06 + Math.random() * 0.05;
  const spd = baseSpeed * cfg.speedMul;
  avx[i] = -Math.sin(angle) * spd;
  avy[i] = Math.cos(angle) * spd;
  aspeed[i] = spd;
  asize[i] = cfg.sizeMin + Math.random() * (cfg.sizeMax - cfg.sizeMin);
  acolor[i] = typeColor(type);
  acircuits[i] = 0;
  aangleAccum[i] = 0;
  alastAngle[i] = angle;

  agroupId[i] = groupId !== undefined ? groupId : -1;
  agroupLeader[i] = leaderIdx !== undefined ? leaderIdx : -1;
  agroupOffX[i] = offX || 0;
  agroupOffY[i] = offY || 0;

  return i;
}

function spawnFamilyCluster() {
  const gid = nextGroupId++;
  const count = 3 + Math.floor(Math.random() * 3);
  const leaderIdx = spawnAgent(true, TYPE_FAMILY, gid, -1, 0, 0);
  if (leaderIdx < 0) return;
  if (Math.random() < 0.15) addEvent('arrival', `family grp ${gid} (${count})`);
  for (let m = 1; m < count; m++) {
    const offAngle = (m / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    const offDist = 3 + Math.random() * 4;
    const ox = Math.cos(offAngle) * offDist;
    const oy = Math.sin(offAngle) * offDist;
    const memberType = Math.random() < 0.3 ? TYPE_CHILD : TYPE_FAMILY;
    const mi = spawnAgent(true, memberType, gid, leaderIdx, ox, oy);
    if (mi >= 0) {
      ax[mi] = ax[leaderIdx] + ox;
      ay[mi] = ay[leaderIdx] + oy;
    }
  }
}

function spawnTourGroup() {
  const gid = nextGroupId++;
  const count = 10 + Math.floor(Math.random() * 11);
  const leaderIdx = spawnAgent(true, TYPE_TOUR, gid, -1, 0, 0);
  if (leaderIdx < 0) return;
  if (Math.random() < 0.3) addEvent('arrival', `tour grp ${gid} (${count})`);
  asize[leaderIdx] = 2.0;
  const lr = (acolor[leaderIdx] & 0xFF);
  const lg = ((acolor[leaderIdx] >> 8) & 0xFF);
  const lb = ((acolor[leaderIdx] >> 16) & 0xFF);
  acolor[leaderIdx] = (220 << 24) | (Math.min(255, lb + 30) << 16) | (Math.min(255, lg + 30) << 8) | Math.min(255, lr + 30);

  const ldx = ax[leaderIdx] - CX, ldy = ay[leaderIdx] - CY;
  const leaderDist = Math.sqrt(ldx * ldx + ldy * ldy);
  const leaderAngle = Math.atan2(ldy, ldx);

  for (let m = 1; m < count; m++) {
    const arcOffset = m * 3.5 / leaderDist;
    const memberAngle = leaderAngle + arcOffset;
    const radialJitter = (Math.random() - 0.5) * 4;
    const mx = CX + Math.cos(memberAngle) * (leaderDist + radialJitter);
    const my = CY + Math.sin(memberAngle) * (leaderDist + radialJitter);

    const offX = Math.cos(arcOffset) * 3 * m * 0.15;
    const offY = Math.sin(arcOffset) * 3 * m * 0.15;
    const mi = spawnAgent(true, TYPE_TOUR, gid, leaderIdx, offX, offY);
    if (mi >= 0) {
      ax[mi] = mx;
      ay[mi] = my;
    }
  }
}

function removeAgent(i) {
  agentCount--;
  if (i < agentCount) {
    ax[i] = ax[agentCount]; ay[i] = ay[agentCount];
    avx[i] = avx[agentCount]; avy[i] = avy[agentCount];
    aspeed[i] = aspeed[agentCount]; asize[i] = asize[agentCount];
    acolor[i] = acolor[agentCount]; acircuits[i] = acircuits[agentCount];
    aangleAccum[i] = aangleAccum[agentCount]; alastAngle[i] = alastAngle[agentCount];
    atype[i] = atype[agentCount];
    agroupId[i] = agroupId[agentCount]; agroupLeader[i] = agroupLeader[agentCount];
    agroupOffX[i] = agroupOffX[agentCount]; agroupOffY[i] = agroupOffY[agentCount];
    for (let j = 0; j < agentCount; j++) {
      if (agroupLeader[j] === agentCount) agroupLeader[j] = i;
    }
  }
}

function smartSpawn() {
  const type = pickType();
  if (type === TYPE_FAMILY) {
    spawnFamilyCluster();
  } else if (type === TYPE_TOUR) {
    spawnTourGroup();
  } else {
    spawnAgent(false, type);
    if (Math.random() < 0.03) addEvent('arrival', `${TYPE_NAMES[type].toLowerCase()} entered mataf`);
  }
}

// --- SPATIAL HASH ---
const CELL = 10;
const GW = Math.ceil(W / CELL);
const GH = Math.ceil(H / CELL);
const gridHead = new Int32Array(GW * GH);
const gridNext = new Int32Array(MAX_AGENTS);

function buildGrid() {
  gridHead.fill(-1);
  for (let i = 0; i < agentCount; i++) {
    const gx = (ax[i] / CELL) | 0;
    const gy = (ay[i] / CELL) | 0;
    if (gx < 0 || gx >= GW || gy < 0 || gy >= GH) continue;
    const k = gy * GW + gx;
    gridNext[i] = gridHead[k];
    gridHead[k] = i;
  }
}

// --- PHYSICS ---
function updateAgents(dt, isPraying) {
  buildGrid();

  for (let i = 0; i < agentCount; i++) {
    const dx = ax[i] - CX, dy = ay[i] - CY;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const angle = Math.atan2(dy, dx);

    if (isPraying) {
      avx[i] *= 0.93;
      avy[i] *= 0.93;
      ax[i] += avx[i] * dt;
      ay[i] += avy[i] * dt;
      continue;
    }

    const type = atype[i];
    const tx = -dy / dist;
    const ty = dx / dist;

    const ringFrac = Math.max(0, Math.min(1, (dist - MATAF_INNER) / (MATAF_OUTER - MATAF_INNER)));
    const ringSpeed = 0.15 + ringFrac * ringFrac * 0.85;
    const speed = aspeed[i] * ringSpeed;

    let fx = tx * speed * 2.0;
    let fy = ty * speed * 2.0;

    const cfg = TYPE_CONFIG[type];
    const prefRingFrac = cfg.ringMin + Math.random() * 0.01 + (cfg.ringMax - cfg.ringMin) * 0.5;
    const prefDist = MATAF_INNER + prefRingFrac * (MATAF_OUTER - MATAF_INNER);
    const ringErr = dist - prefDist;
    fx -= (dx / dist) * ringErr * 0.004;
    fy -= (dy / dist) * ringErr * 0.004;

    if (dist < MATAF_INNER + 6) {
      const push = (MATAF_INNER + 6 - dist) * 0.25;
      fx += (dx / dist) * push;
      fy += (dy / dist) * push;
    }
    if (dist > MATAF_OUTER - 4) {
      const push = (dist - MATAF_OUTER + 4) * 0.2;
      fx -= (dx / dist) * push;
      fy -= (dy / dist) * push;
    }

    const leader = agroupLeader[i];
    if (leader >= 0 && leader < agentCount) {
      const ldx = ax[leader] + agroupOffX[i] - ax[i];
      const ldy = ay[leader] + agroupOffY[i] - ay[i];
      const ldist = Math.sqrt(ldx * ldx + ldy * ldy);
      if (ldist > 2) {
        const pull = Math.min(ldist * 0.06, 0.8);
        fx += (ldx / ldist) * pull;
        fy += (ldy / ldist) * pull;
      }
      fx += (avx[leader] - avx[i]) * 0.15;
      fy += (avy[leader] - avy[i]) * 0.15;
    }

    if (type === TYPE_CHILD) {
      fx += (Math.random() - 0.5) * 0.4;
      fy += (Math.random() - 0.5) * 0.4;
    }

    const gx0 = (ax[i] / CELL) | 0;
    const gy0 = (ay[i] / CELL) | 0;
    let sepX = 0, sepY = 0, sepN = 0;
    let alignVx = 0, alignVy = 0, alignN = 0;

    const hardBody2 = ringFrac < 0.25 ? 1.5 : 2.5;
    const softDist2 = ringFrac < 0.25 ? 3 : (ringFrac < 0.5 ? 6 : 12);
    const sepStrength = ringFrac < 0.25 ? 0.3 : 0.6;

    for (let dgy = -1; dgy <= 1; dgy++) {
      for (let dgx = -1; dgx <= 1; dgx++) {
        const gx = gx0 + dgx, gy = gy0 + dgy;
        if (gx < 0 || gx >= GW || gy < 0 || gy >= GH) continue;
        let j = gridHead[gy * GW + gx];
        while (j >= 0) {
          if (j !== i) {
            const ndx = ax[i] - ax[j], ndy = ay[i] - ay[j];
            const nd2 = ndx*ndx + ndy*ndy;
            if (nd2 < hardBody2 && nd2 > 0.001) {
              const nd = Math.sqrt(nd2);
              sepX += (ndx / nd) * 1.5;
              sepY += (ndy / nd) * 1.5;
              sepN++;
            } else if (nd2 < softDist2 && nd2 > 0.001) {
              const nd = Math.sqrt(nd2);
              const f = (1.0 - nd / Math.sqrt(softDist2)) * sepStrength;
              sepX += (ndx / nd) * f;
              sepY += (ndy / nd) * f;
              sepN++;
            }
            if (nd2 < 64) {
              alignVx += avx[j];
              alignVy += avy[j];
              alignN++;
            }
          }
          j = gridNext[j];
        }
      }
    }

    fx += sepX * 0.5;
    fy += sepY * 0.5;
    if (alignN > 0) {
      fx += (alignVx / alignN - avx[i]) * 0.1;
      fy += (alignVy / alignN - avy[i]) * 0.1;
    }

    const noiseMul = type === TYPE_ELDERLY ? 0.03 : (type === TYPE_FAMILY ? 0.05 : 0.08);
    fx += (Math.random() - 0.5) * noiseMul;
    fy += (Math.random() - 0.5) * noiseMul;

    avx[i] += (fx - avx[i]) * 0.1;
    avy[i] += (fy - avy[i]) * 0.1;

    const v = Math.sqrt(avx[i]*avx[i] + avy[i]*avy[i]);
    const maxV = speed * 1.3;
    if (v > maxV) {
      avx[i] = (avx[i] / v) * maxV;
      avy[i] = (avy[i] / v) * maxV;
    }

    ax[i] += avx[i] * dt;
    ay[i] += avy[i] * dt;

    // Circuit tracking
    const newAngle = Math.atan2(ay[i] - CY, ax[i] - CX);
    let dAngle = newAngle - alastAngle[i];
    if (dAngle > Math.PI) dAngle -= 2 * Math.PI;
    if (dAngle < -Math.PI) dAngle += 2 * Math.PI;
    if (dAngle < 0) aangleAccum[i] += -dAngle;
    alastAngle[i] = newAngle;

    if (aangleAccum[i] >= Math.PI * 2) {
      acircuits[i]++;
      aangleAccum[i] -= Math.PI * 2;
      circuitsThisMinute++;
      if (acircuits[i] >= 7) {
        totalTawaf++;
        if (Math.random() < 0.08) addEvent('circuit', `${TYPE_NAMES[atype[i]].toLowerCase()} completed 7 circuits`);
        removeAgent(i);
        i--;
        continue;
      }
    }

    const newDist = Math.sqrt((ax[i]-CX)*(ax[i]-CX) + (ay[i]-CY)*(ay[i]-CY));
    if (newDist < MATAF_INNER) {
      ax[i] = CX + (ax[i]-CX) / newDist * (MATAF_INNER + 1);
      ay[i] = CY + (ay[i]-CY) / newDist * (MATAF_INNER + 1);
    }
    if (newDist > MATAF_OUTER) {
      ax[i] = CX + (ax[i]-CX) / newDist * (MATAF_OUTER - 1);
      ay[i] = CY + (ay[i]-CY) / newDist * (MATAF_OUTER - 1);
    }
  }
}

// --- BAYESIAN CROWD MODEL ---
const bayesModel = {
  priors: new Float32Array(24),
  observations: new Float32Array(24),
  counts: new Uint16Array(24),
  confidence: 0,
  lastUpdate: 0,
  predictionError: 0,
  // Expose intermediate values for display
  lastPrior: 0,
  lastLikelihood: 0,
  lastEvidence: 0,
  lastPosterior: 0,
};

(function initBayes() {
  const hourProfile = [0.6,0.4,0.35,0.3,0.35,0.7,0.9,0.8,0.75,0.85,0.9,0.95,1.0,0.85,0.8,0.85,0.9,0.95,1.0,0.95,0.9,0.85,0.8,0.7];
  for (let h = 0; h < 24; h++) bayesModel.priors[h] = hourProfile[h];
})();

function updateBayesModel() {
  const makkah = getMakkahTime();
  const hour = makkah.getHours();
  const now = Date.now();

  if (now - bayesModel.lastUpdate < 30000) return;
  bayesModel.lastUpdate = now;

  const observed = agentCount / 3200;
  const predicted = bayesModel.priors[hour];

  // Bayesian update with exposed intermediate values
  const alpha = 0.05;
  bayesModel.observations[hour] = observed;
  bayesModel.counts[hour]++;
  const n = Math.min(bayesModel.counts[hour], 20);
  const weight = alpha * n;

  // P(H) = prior belief about crowd level
  bayesModel.lastPrior = predicted;
  // P(D|H) = likelihood of observing this count given our model
  bayesModel.lastLikelihood = Math.exp(-Math.pow(observed - predicted, 2) / (2 * 0.1));
  // P(D) = evidence (marginal probability)
  bayesModel.lastEvidence = bayesModel.lastLikelihood * predicted + (1 - bayesModel.lastLikelihood) * (1 - predicted);
  if (bayesModel.lastEvidence < 0.001) bayesModel.lastEvidence = 0.001;
  // P(H|D) = posterior
  bayesModel.lastPosterior = (bayesModel.lastLikelihood * predicted) / bayesModel.lastEvidence;

  bayesModel.priors[hour] = predicted * (1 - weight) + observed * weight;
  bayesModel.priors[hour] = Math.max(0.1, Math.min(1.0, bayesModel.priors[hour]));

  bayesModel.predictionError = Math.abs(predicted - observed);

  const totalObs = bayesModel.counts.reduce((s, c) => s + c, 0);
  const errorFactor = Math.max(0, 1 - bayesModel.predictionError * 3);
  bayesModel.confidence = Math.min(1, (totalObs / 50) * errorFactor);
}

function renderBayesUI() {
  document.getElementById('b-prior').textContent = bayesModel.lastPrior.toFixed(3);
  document.getElementById('b-likelihood').textContent = bayesModel.lastLikelihood.toFixed(3);
  document.getElementById('b-evidence').textContent = bayesModel.lastEvidence.toFixed(3);
  document.getElementById('b-posterior').textContent = bayesModel.lastPosterior.toFixed(3);

  const makkah = getMakkahTime();
  const hour = makkah.getHours();
  document.getElementById('b-predicted').textContent = (bayesModel.priors[hour] * 3200).toFixed(0);
  document.getElementById('b-actual').textContent = agentCount;
  document.getElementById('b-error').textContent = (bayesModel.predictionError * 100).toFixed(1) + '%';

  // Confidence bar
  const conf = bayesModel.confidence;
  const filled = Math.round(conf * 10);
  const segs = document.getElementById('conf-bar').children;
  for (let i = 0; i < segs.length; i++) {
    segs[i].classList.toggle('filled', i < filled);
  }
}

// Background
const bgCanvas = document.createElement('canvas');
bgCanvas.width = W; bgCanvas.height = H;
const bgCtx = bgCanvas.getContext('2d');
function renderBackground() {
  bgCtx.fillStyle = '#000';
  bgCtx.fillRect(0, 0, W, H);

  // Subtle radial glow
  const bg = bgCtx.createRadialGradient(CX, CY, 20, CX, CY, MATAF_OUTER + 60);
  bg.addColorStop(0, 'rgba(0,255,255,0.02)');
  bg.addColorStop(0.4, 'rgba(0,255,255,0.008)');
  bg.addColorStop(1, 'rgba(0,0,0,0)');
  bgCtx.fillStyle = bg;
  bgCtx.fillRect(0, 0, W, H);

  // Mataf zone hint
  bgCtx.save();
  bgCtx.globalAlpha = 0.02;
  bgCtx.beginPath();
  bgCtx.arc(CX, CY, MATAF_OUTER + 5, 0, Math.PI * 2);
  bgCtx.arc(CX, CY, MATAF_INNER - 3, 0, Math.PI * 2, true);
  bgCtx.fillStyle = '#00FFFF';
  bgCtx.fill();
  bgCtx.restore();

  // Ring guides
  bgCtx.save();
  bgCtx.globalAlpha = 0.04;
  bgCtx.strokeStyle = '#00FFFF';
  bgCtx.lineWidth = 0.3;
  for (let r = MATAF_INNER; r <= MATAF_OUTER; r += 15) {
    bgCtx.beginPath();
    bgCtx.arc(CX, CY, r, 0, Math.PI * 2);
    bgCtx.stroke();
  }
  bgCtx.restore();

  // Radial lines
  bgCtx.save();
  bgCtx.globalAlpha = 0.02;
  bgCtx.strokeStyle = '#00FFFF';
  bgCtx.lineWidth = 0.3;
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    bgCtx.beginPath();
    bgCtx.moveTo(CX + Math.cos(a) * MATAF_INNER, CY + Math.sin(a) * MATAF_INNER);
    bgCtx.lineTo(CX + Math.cos(a) * (MATAF_OUTER + 5), CY + Math.sin(a) * (MATAF_OUTER + 5));
    bgCtx.stroke();
  }
  bgCtx.restore();

  // Outer ring
  bgCtx.save();
  bgCtx.globalAlpha = 0.06;
  bgCtx.beginPath();
  bgCtx.arc(CX, CY, MATAF_OUTER + 2, 0, Math.PI * 2);
  bgCtx.strokeStyle = '#00FFFF';
  bgCtx.lineWidth = 0.5;
  bgCtx.stroke();
  bgCtx.restore();
}
renderBackground();

function drawAgentsCanvas() {
  ctx.drawImage(bgCanvas, 0, 0);

  // Crowd glow — cyan tint
  if (agentCount > 30) {
    const intensity = Math.min(agentCount / 2000, 1) * 0.12;
    const glow = ctx.createRadialGradient(CX, CY, MATAF_INNER - 5, CX, CY, MATAF_OUTER + 20);
    glow.addColorStop(0, `rgba(0,255,255,${intensity * 0.3})`);
    glow.addColorStop(0.3, `rgba(0,200,200,${intensity * 0.6})`);
    glow.addColorStop(0.6, `rgba(0,150,150,${intensity})`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(CX, CY, MATAF_OUTER + 20, 0, Math.PI * 2);
    ctx.fill();
  }

  // Motion trail
  tctx.globalCompositeOperation = 'destination-out';
  tctx.globalAlpha = 0.1;
  tctx.fillStyle = '#000';
  tctx.fillRect(0, 0, W, H);
  tctx.globalCompositeOperation = 'source-over';
  tctx.globalAlpha = 1;

  for (let i = 0; i < agentCount; i++) {
    const col = acolor[i];
    const r = col & 0xFF;
    const g = (col >> 8) & 0xFF;
    const b = (col >> 16) & 0xFF;
    const sz = asize[i] * 0.4;
    tctx.fillStyle = `rgba(${r},${g},${b},0.06)`;
    tctx.fillRect(ax[i] - sz, ay[i] - sz, sz * 2, sz * 2);
  }

  ctx.save();
  ctx.globalAlpha = 0.3;
  ctx.drawImage(trailCanvas, 0, 0);
  ctx.restore();

  // Draw agents with subtle glow
  for (let i = 0; i < agentCount; i++) {
    const col = acolor[i];
    const r = col & 0xFF;
    const g = (col >> 8) & 0xFF;
    const b = (col >> 16) & 0xFF;
    const a = ((col >> 24) & 0xFF) / 255;
    const sz = asize[i];
    const px = ax[i], py = ay[i];

    const ddx = px - CX, ddy = py - CY;
    const d = Math.sqrt(ddx*ddx + ddy*ddy);
    const ringF = (d - MATAF_INNER) / (MATAF_OUTER - MATAF_INNER);

    if (ringF < 0.4) {
      ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
      ctx.fillRect(px - sz, py - sz, sz * 2, sz * 2);
    } else {
      const vl = Math.sqrt(avx[i]*avx[i] + avy[i]*avy[i]);
      if (vl > 0.04) {
        const streakLen = Math.min(vl * 6, 8);
        const nx = avx[i] / vl, ny = avy[i] / vl;
        ctx.beginPath();
        ctx.moveTo(px + ny * sz * 0.4, py - nx * sz * 0.4);
        ctx.lineTo(px - nx * streakLen, py - ny * streakLen);
        ctx.lineTo(px - ny * sz * 0.4, py + nx * sz * 0.4);
        ctx.closePath();
        ctx.fillStyle = `rgba(${r},${g},${b},${a * 0.15})`;
        ctx.fill();
      }
      ctx.beginPath();
      ctx.arc(px, py, sz, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
      ctx.fill();
    }
  }

  // Ka'bah
  ctx.drawImage(kaabahImg, CX - KAABAH_SIZE/2 - 10, CY - KAABAH_SIZE/2 - 10);
}

    lastCircuitReset = now;
  }
  document.getElementById('s-circhr').textContent = circuitsPerHour.toLocaleString();

  // Average circuit time (rough estimate based on speed)
  const avgSpeed = agentCount > 0 ? aspeed.subarray(0, agentCount).reduce((s,v) => s+v, 0) / agentCount : 0.08;
  const avgCircumference = 2 * Math.PI * ((MATAF_INNER + MATAF_OUTER) / 2);
  const avgCircuitFrames = avgSpeed > 0 ? avgCircumference / avgSpeed : 999;
  const avgCircuitSec = Math.round(avgCircuitFrames * 16.67 / 1000);
  document.getElementById('s-avgtime').textContent = avgCircuitSec + 's';

  // Density index
  const matafArea = Math.PI * (MATAF_OUTER * MATAF_OUTER - MATAF_INNER * MATAF_INNER);
  const densityIndex = (agentCount / matafArea * 100).toFixed(1);
  document.getElementById('s-density').textContent = densityIndex;

  // Countdown
  document.getElementById('s-countdown').textContent = info.nextIn || '—';

  renderBayesUI();
  renderDemographics();
  renderLog();
}

// --- MAIN LOOP ---
let lastTime = 0;
let uiTimer = 0;
let densityTimer = 0;
let prayerInfo = {current:'—',next:'—',nextIn:'',phase:'tawaf',target:800};

function loop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min((timestamp - lastTime) / 16.67, 3);
  lastTime = timestamp;

  uiTimer++;
  densityTimer++;
  if (uiTimer >= 60) {
    uiTimer = 0;
    prayerInfo = getCurrentPrayerInfo();
    targetAgentCount = prayerInfo.target;
    updateUI(prayerInfo);
    updateBayesModel();
  }
  if (densityTimer >= 120) {
    densityTimer = 0;
    recordDensity();
    drawDensityChart();
  }

  const diff = targetAgentCount - agentCount;
  if (diff > 0) {
    const n = Math.min(diff, Math.max(15, (diff * 0.12) | 0));
    for (let i = 0; i < n; i++) smartSpawn();
  } else if (diff < -10 && prayerInfo.phase !== 'prayer') {
    const n = Math.min(-diff, 6);
    for (let i = 0; i < n; i++) {
      if (agentCount > 0) removeAgent(agentCount - 1);
    }
  }

  updateAgents(dt, prayerInfo.phase === 'prayer');
  drawAgentsCanvas();

  requestAnimationFrame(loop);
}

// --- INIT ---
addEvent('system', 'tawaf engine initializing');
addEvent('system', 'connecting to aladhan api');

fetchPrayerTimes().then(() => {
  addEvent('system', 'prayer times loaded');
  prayerInfo = getCurrentPrayerInfo();
  targetAgentCount = prayerInfo.target;
  updateUI(prayerInfo);

  for (let i = 0; i < targetAgentCount; i++) {
    const type = pickType();
    if (type === TYPE_FAMILY) {
      spawnFamilyCluster();
      i += 3;
    } else if (type === TYPE_TOUR) {
      spawnTourGroup();
      i += 14;
    } else {
      spawnAgent(true, type);
    }
  }

  addEvent('system', `${agentCount} agents spawned`);
  tctx.clearRect(0, 0, W, H);
  requestAnimationFrame(loop);
});
</script>
