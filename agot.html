<body>
<script type="importmap">
{"imports":{
  "three":"https://esm.sh/three@0.170.0",
  "three/addons/":"https://esm.sh/three@0.170.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { RectAreaLightUniformsLib } from 'three/addons/lights/RectAreaLightUniformsLib.js';

/* ═══════════════════════════════════════════════════
   SETUP
   ═══════════════════════════════════════════════════ */
const W = window.innerWidth, H = window.innerHeight;
const dpr = Math.min(window.devicePixelRatio, 2);
const TAU = Math.PI * 2;
const CUBE_Y = 0.57;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.toneMapping = THREE.AgXToneMapping;
renderer.toneMappingExposure = 0.95;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(dpr);
renderer.setSize(W, H);
document.body.appendChild(renderer.domElement);

// FBO render target
const fboRT = new THREE.WebGLRenderTarget(W * dpr, H * dpr, {
  minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
  format: THREE.RGBAFormat, samples: 4,
});

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d12);
scene.fog = new THREE.FogExp2(0x0d0d12, 0.035);

const camera = new THREE.PerspectiveCamera(35, W / H, 0.01, 1000);
camera.position.set(0.2, 9.7, 15.0);
camera.lookAt(0, -0.8, 1.0);

/* ═══════════════════════════════════════════════════
   DICHROIC GLASS CUBE SHADER
   ═══════════════════════════════════════════════════ */
const dichroicVert = `
  varying vec3 vViewNormal, vViewDir, vLocalPos, vWorldPos, vWorldNormal;
  void main() {
    vLocalPos = position;
    vec4 worldPos = modelMatrix * vec4(position, 1.0);
    vWorldPos = worldPos.xyz;
    vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
    vViewNormal = normalize(normalMatrix * normal);
    vViewDir = -mvPos.xyz;
    gl_Position = projectionMatrix * mvPos;
  }
`;

const dichroicFrag = `
  uniform sampler2D uScene;
  uniform vec2      uRes;
  uniform float     uIorR, uIorG, uIorB;
  uniform float     uAb, uDich, uFresnel, uTime, uAspect;
  uniform vec3      uSpecLightPos, uCamWorldPos;
  uniform float     uSpecIntensity;

  // LTC RectAreaLight uniforms
  uniform sampler2D ltc_1, ltc_2;
  uniform vec3      uRect0Pos, uRect0HW, uRect0HH, uRect0Color;

  varying vec3 vViewNormal, vViewDir, vLocalPos, vWorldPos, vWorldNormal;

  vec3 thinFilm(float cosT, float t) {
    float p = 6.28318 * 5.0 * cosT + t * 0.25;
    return vec3(0.5+0.5*cos(p), 0.5+0.5*cos(p-2.094), 0.5+0.5*cos(p+2.094));
  }

  // LTC math
  vec2 ltcUv(vec3 N, vec3 V, float roughness) {
    const float LUT_SIZE = 64.0, LUT_SCALE = 63.0/64.0, LUT_BIAS = 0.5/64.0;
    float dotNV = clamp(dot(N, V), 0.0, 1.0);
    return vec2(roughness, sqrt(1.0 - dotNV)) * LUT_SCALE + LUT_BIAS;
  }
  float ltcClippedSphere(vec3 f) { float l = length(f); return max((l*l+f.z)/(l+1.0), 0.0); }
  vec3 ltcEdgeVector(vec3 v1, vec3 v2) {
    float x = dot(v1,v2); float y = abs(x);
    float a = 0.8543985 + (0.4965155 + 0.0145206*y)*y;
    float b = 3.4175940 + (4.1616724 + y)*y;
    float v = a/b;
    float ts = (x>0.0) ? v : 0.5*inversesqrt(max(1.0-x*x,1e-7))-v;
    return cross(v1,v2)*ts;
  }
  float ltcEvaluate(vec3 N, vec3 V, vec3 P, mat3 mInv, vec3 rc[4]) {
    vec3 bv1=rc[1]-rc[0]; vec3 bv2=rc[3]-rc[0];
    if(dot(cross(bv1,bv2),P-rc[0])<0.0) return 0.0;
    vec3 T1=normalize(V-N*dot(V,N)); vec3 T2=-cross(N,T1);
    mat3 mat=mInv*transpose(mat3(T1,T2,N));
    vec3 c0=normalize(mat*(rc[0]-P)); vec3 c1=normalize(mat*(rc[1]-P));
    vec3 c2=normalize(mat*(rc[2]-P)); vec3 c3=normalize(mat*(rc[3]-P));
    return ltcClippedSphere(ltcEdgeVector(c0,c1)+ltcEdgeVector(c1,c2)+ltcEdgeVector(c2,c3)+ltcEdgeVector(c3,c0));
  }
  vec3 rectLtcContrib(vec3 lpos, vec3 lhw, vec3 lhh, vec3 lcol, vec3 wp, vec3 N, vec3 V, float rough) {
    vec3 rc[4]; rc[0]=lpos+lhw-lhh; rc[1]=lpos-lhw-lhh; rc[2]=lpos-lhw+lhh; rc[3]=lpos+lhw+lhh;
    vec2 uv=ltcUv(N,V,rough);
    vec4 t1=texture2D(ltc_1,uv); vec4 t2=texture2D(ltc_2,uv);
    mat3 mInv=mat3(vec3(t1.x,0.0,t1.y),vec3(0.0,1.0,0.0),vec3(t1.z,0.0,t1.w));
    vec3 F0=vec3(0.04); vec3 fresnel=F0*t2.x+(1.0-F0)*t2.y;
    return lcol*fresnel*ltcEvaluate(N,V,wp,mInv,rc);
  }

  void main() {
    vec2 uv = gl_FragCoord.xy / uRes;
    vec3 n = normalize(vViewNormal);
    vec3 e = normalize(vViewDir);

    // Per-face optical differentiation
    vec3 Nabs = abs(normalize(vWorldNormal));
    float faceX = smoothstep(0.6, 0.95, Nabs.x);
    float faceY = smoothstep(0.6, 0.95, Nabs.y);
    float faceZ = smoothstep(0.6, 0.95, Nabs.z);

    float iorShiftR = faceX*0.05 - faceY*0.04 + faceZ*(-0.015);
    float iorShiftG = faceX*(-0.025) + faceY*0.03 - faceZ*0.03;
    float iorShiftB = faceX*(-0.045) + faceY*0.02 + faceZ*0.045;
    float iorR = uIorR + iorShiftR;
    float iorG = uIorG + iorShiftG;
    float iorB = uIorB + iorShiftB;

    float abScale = 1.0 + faceX*0.35 - faceY*0.3 + faceZ*0.15;

    float diagInput = vLocalPos.x + vLocalPos.y
                    + faceY*(vLocalPos.z*1.4 - vLocalPos.y*0.7)
                    + faceZ*(vLocalPos.y*1.1 - vLocalPos.x*0.8);
    float diagRaw = sin(diagInput * 1.8) * 0.5 + 0.5;
    float diagF = diagRaw * uDich;
    vec3 dn = normalize(mix(n, normalize(vec3(1.0,1.0,0.0)), diagF*0.08));

    vec3 rR = refract(-e, dn, 1.0/iorR);
    vec3 rG = refract(-e, dn, 1.0/iorG);
    vec3 rB = refract(-e, dn, 1.0/iorB);
    if(length(rR)<0.001) rR = -e;
    if(length(rG)<0.001) rG = -e;
    if(length(rB)<0.001) rB = -e;

    vec2 faceUvOff = vec2(
      dot(normalize(vWorldNormal), vec3(0.025,-0.015,0.018)),
      dot(normalize(vWorldNormal), vec3(-0.018,0.022,-0.013))
    );
    vec2 abXY = vec2(uAb/uAspect, uAb) * abScale;
    float R = texture2D(uScene, clamp(uv + faceUvOff + rR.xy*abXY, 0.001, 0.999)).r;
    float G = texture2D(uScene, clamp(uv + faceUvOff + rG.xy*abXY, 0.001, 0.999)).g;
    float B = texture2D(uScene, clamp(uv + faceUvOff + rB.xy*abXY, 0.001, 0.999)).b;
    vec3 refracted = vec3(R, G, B);

    float cosT = clamp(dot(e, n), 0.0, 1.0);
    float fresnel = pow(1.0 - cosT, uFresnel);
    vec3 irid = thinFilm(cosT, uTime);

    vec3 Nw = normalize(vWorldNormal);
    vec3 Vw = normalize(uCamWorldPos - vWorldPos);

    float bottomAtten = 1.0 - 0.55*smoothstep(-0.3, -0.95, Nw.y);
    vec3 col = refracted * vec3(1.0,1.0,1.0) * 2.8 * bottomAtten;

    col = mix(col, col*irid*1.4, diagF*0.22);
    col += irid * diagF * fresnel * 0.12;
    col += vec3(0.80,0.92,1.00) * fresnel * 0.40;

    float skyFacing = max(Nw.y, 0.0);
    col += pow(skyFacing, 1.8) * vec3(0.90,0.94,1.00) * 0.06;

    float NdotV = max(dot(Nw, Vw), 0.0);
    float edgeCatch = pow(1.0 - NdotV, 4.5);
    col += vec3(0.70,0.85,1.00) * edgeCatch * 1.30;

    float shadowSide = smoothstep(0.1, 0.7, Nw.x) * (1.0 - abs(Nw.y));
    col += vec3(0.50,0.60,0.80) * edgeCatch * shadowSide * 0.05;

    // Specular
    vec3 Lw = normalize(uSpecLightPos - vWorldPos);
    vec3 Hw = normalize(Lw + Vw);
    float fresnelW = pow(1.0 - NdotV, 4.0);
    float spec = pow(max(dot(Nw, Hw), 0.0), 256.0);
    col += vec3(1.00,0.97,0.95) * uSpecIntensity * spec * fresnelW;

    // LTC rect light
    float glassRoughness = 0.08;
    vec3 rectSpec = rectLtcContrib(uRect0Pos, uRect0HW, uRect0HH, uRect0Color, vWorldPos, Nw, Vw, glassRoughness);
    rectSpec *= (0.3 + 0.7*fresnelW);
    rectSpec = mix(rectSpec, rectSpec*irid, diagF*0.35);
    col += rectSpec;

    // Top-face dichroic iridescence
    float topFace = smoothstep(0.5, 0.92, Nw.y);
    vec3 topIrid = thinFilm(NdotV, uTime*0.4);
    col = mix(col, col*topIrid*1.6 + topIrid*0.18, topFace*0.40);
    float topFresnel = pow(1.0 - NdotV, 3.0) * topFace;
    col += vec3(0.25,0.15,0.55) * topFresnel * 0.15;

    gl_FragColor = vec4(col, 1.0);
  }
`;

RectAreaLightUniformsLib.init();

const cubeMat = new THREE.ShaderMaterial({
  uniforms: {
    uScene:         { value: null },
    uRes:           { value: new THREE.Vector2(W * dpr, H * dpr) },
    uIorR:          { value: 1.50 },
    uIorG:          { value: 1.56 },
    uIorB:          { value: 1.63 },
    uAb:            { value: 0.09 },
    uDich:          { value: 0.70 },
    uFresnel:       { value: 4.0 },
    uTime:          { value: 0 },
    uAspect:        { value: W / H },
    uSpecLightPos:  { value: new THREE.Vector3(2.5, 4.0, 2.5) },
    uCamWorldPos:   { value: new THREE.Vector3() },
    uSpecIntensity: { value: 2.8 },
    ltc_1:          { value: THREE.UniformsLib.LTC_HALF_1 },
    ltc_2:          { value: THREE.UniformsLib.LTC_HALF_2 },
    uRect0Pos:      { value: new THREE.Vector3() },
    uRect0HW:       { value: new THREE.Vector3() },
    uRect0HH:       { value: new THREE.Vector3() },
    uRect0Color:    { value: new THREE.Color() },
  },
  vertexShader: dichroicVert,
  fragmentShader: dichroicFrag,
  side: THREE.FrontSide,
});

/* ═══════════════════════════════════════════════════
   CUBE + PRISM GROUP
   ═══════════════════════════════════════════════════ */
const prismGroup = new THREE.Group();
scene.add(prismGroup);

const cubeMesh = new THREE.Mesh(
  new THREE.BoxGeometry(1.2, 1.2, 1.2, 4, 4, 4), cubeMat
);
cubeMesh.position.y = CUBE_Y;
cubeMesh.castShadow = true;
prismGroup.add(cubeMesh);
prismGroup.rotation.y = Math.PI / 4;

/* ═══════════════════════════════════════════════════
   PODIUM
   ═══════════════════════════════════════════════════ */
const PODIUM_W = 1.2 * 2.2;
const podiumBase = { roughness: 0.35, metalness: 0.06, clearcoat: 0.5, clearcoatRoughness: 0.12, color: 0x1a1a28, fog: false };
const podiumMats = [
  new THREE.MeshPhysicalMaterial({ ...podiumBase, emissive: 0x606098, emissiveIntensity: 3.5 }),
  new THREE.MeshPhysicalMaterial({ ...podiumBase, emissive: 0x141424, emissiveIntensity: 0.7 }),
  new THREE.MeshPhysicalMaterial({ ...podiumBase, emissive: 0x080810, emissiveIntensity: 0.3, roughness: 0.75, clearcoat: 0.08 }),
  new THREE.MeshPhysicalMaterial({ ...podiumBase, emissive: 0x020204, emissiveIntensity: 0.1 }),
  new THREE.MeshPhysicalMaterial({ ...podiumBase, emissive: 0x161630, emissiveIntensity: 0.9 }),
  new THREE.MeshPhysicalMaterial({ ...podiumBase, emissive: 0x030306, emissiveIntensity: 0.1 }),
];
const podiumMesh = new THREE.Mesh(new THREE.BoxGeometry(PODIUM_W, 20, PODIUM_W), podiumMats);
podiumMesh.position.y = -10.03;
podiumMesh.receiveShadow = true;
podiumMesh.castShadow = true;
scene.add(podiumMesh);

/* ═══════════════════════════════════════════════════
   FLOOR FOG LAYERS
   ═══════════════════════════════════════════════════ */
const fogLayerMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uOpacity: { value: 0.27 }, uColor: { value: new THREE.Color(0x1a2888) } },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    uniform float uTime, uOpacity; uniform vec3 uColor; varying vec2 vUv;
    void main(){ vec2 c=vUv-0.5; float d=length(c)*2.0;
      float fog=1.0-smoothstep(0.15,1.0,d);
      float breath=0.88+0.12*sin(uTime*0.6);
      gl_FragColor=vec4(uColor,fog*uOpacity*breath); }`,
  transparent: true, depthWrite: false, blending: THREE.NormalBlending, side: THREE.DoubleSide,
});
const fogMesh = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), fogLayerMat);
fogMesh.rotation.x = -Math.PI / 2; fogMesh.position.y = 0.018;
scene.add(fogMesh);

const warmFogMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uOpacity: { value: 0.09 }, uColor: { value: new THREE.Color(0x9e4200) } },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    uniform float uTime, uOpacity; uniform vec3 uColor; varying vec2 vUv;
    void main(){ vec2 c=vUv-0.5; float d=length(c)*2.5;
      float fog=1.0-smoothstep(0.05,1.0,d);
      float breath=0.88+0.12*sin(uTime*0.52+0.9);
      gl_FragColor=vec4(uColor,fog*uOpacity*breath); }`,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
});
const warmFogMesh = new THREE.Mesh(new THREE.PlaneGeometry(55, 55), warmFogMat);
warmFogMesh.rotation.x = -Math.PI / 2; warmFogMesh.position.set(1.2, 0.017, 7.0);
scene.add(warmFogMesh);

/* ═══════════════════════════════════════════════════
   LIGHTING RIG
   ═══════════════════════════════════════════════════ */
scene.add(new THREE.AmbientLight(0xffffff, 0.07));

// Back fill
const back = new THREE.SpotLight(0x4040a0, 50);
back.position.set(3.0, 3.0, -5.5);
back.target.position.set(0, 0.5, 0);
back.angle = 0.70; back.penumbra = 0.85; back.decay = 1.1;
scene.add(back); scene.add(back.target);

// Cube back (transmission key)
const cubeBack = new THREE.SpotLight(0xffeedd, 7);
cubeBack.position.set(0.5, 10, -5);
cubeBack.target.position.set(0, 0.6, 0);
cubeBack.angle = 0.18; cubeBack.penumbra = 0.7; cubeBack.decay = 2;
scene.add(cubeBack); scene.add(cubeBack.target);

// Violet rim
const violetRim = new THREE.SpotLight(0x8055f0, 6);
violetRim.position.set(-4, 9, -2);
violetRim.target.position.set(0, 0.6, 0);
violetRim.angle = 0.18; violetRim.penumbra = 0.2; violetRim.decay = 1.4;
scene.add(violetRim); scene.add(violetRim.target);

// Cool rim
const rim = new THREE.SpotLight(0x8060c0, 5);
rim.position.set(-1.5, 5.5, -3.5);
rim.target.position.set(0, 0.6, 0);
rim.angle = 0.45; rim.penumbra = 0.85;
scene.add(rim); scene.add(rim.target);

// Cube sun (dichroic driver — orbits)
const cubeSun = new THREE.PointLight(0xe8f2ff, 10, 14);
cubeSun.position.set(0, 0.2, -2.8);
scene.add(cubeSun);

// Podium front wash
const podiumFrontWash = new THREE.SpotLight(0xc0a880, 12);
podiumFrontWash.position.set(0, 4.0, 6.0);
podiumFrontWash.target.position.set(0, -2.5, 0);
podiumFrontWash.angle = 0.50; podiumFrontWash.penumbra = 0.75; podiumFrontWash.decay = 1.2; podiumFrontWash.distance = 12;
scene.add(podiumFrontWash); scene.add(podiumFrontWash.target);

// Plinth rect light
const plinthRect = new THREE.RectAreaLight(0xddddf8, 8, 6, 3);
plinthRect.position.set(-2, -8, 4);
plinthRect.lookAt(1, 0, 1.32);
scene.add(plinthRect);

// Plinth spot
const plinthSpot = new THREE.SpotLight(0xddddf8, 12, 20, 0.5, 0.6, 1);
plinthSpot.position.set(3, 3, -1.5);
plinthSpot.target.position.set(-1, -0.5, 1.5);
scene.add(plinthSpot); scene.add(plinthSpot.target);

// Floor caustics
[
  {c:0x6600ff,i:1.2,d:3.2,x:-1.8,y:0.06,z:-0.5},
  {c:0x0033ff,i:0.9,d:2.8,x:-1.3,y:0.06,z:-0.9},
  {c:0x00aaff,i:1.6,d:2.8,x: 0.8,y:0.06,z:-1.2},
  {c:0xeeeeff,i:0.7,d:2.0,x: 0.3,y:0.06,z: 0.3},
  {c:0xffee00,i:1.2,d:1.8,x: 0.5,y:0.06,z:-0.4},
  {c:0xff8800,i:1.2,d:1.8,x:-0.4,y:0.06,z: 0.2},
  {c:0xff2200,i:1.0,d:1.5,x:-0.6,y:0.06,z:-0.4},
].forEach(({c,i,d,x,y,z})=>{ const pl=new THREE.PointLight(c,i,d); pl.position.set(x,y,z); scene.add(pl); });

/* ═══════════════════════════════════════════════════
   SPECTRAL CLOCK HANDS
   ═══════════════════════════════════════════════════ */
const clockRays = [];
const RAY_VERT = `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`;
const RAY_FRAG = `
  uniform vec3 c1,c2; uniform float op; varying vec2 vUv;
  void main(){
    vec3 col=mix(c1,c2,pow(clamp(vUv.y,0.,1.),0.6));
    float sx=exp(-pow((vUv.x-0.5)*5.6,2.0));
    float sy=smoothstep(0.0,0.08,vUv.y)*smoothstep(1.0,0.36,vUv.y);
    gl_FragColor=vec4(col,sx*sy*op);
  }
`;
function mkRayMat(c1,c2,op){
  return new THREE.ShaderMaterial({
    uniforms:{c1:{value:new THREE.Color(c1)},c2:{value:new THREE.Color(c2)},op:{value:op}},
    vertexShader:RAY_VERT, fragmentShader:RAY_FRAG,
    transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, side:THREE.DoubleSide
  });
}
function floorRay(az, c1, c2, w, len, op) {
  const g = new THREE.PlaneGeometry(w, len, 1, 16); g.translate(0, len/2, 0);
  const grp = new THREE.Group();
  const mesh = new THREE.Mesh(g, mkRayMat(c1, c2, op));
  grp.add(mesh);
  grp.position.y = 0.008;
  grp.rotation.order = 'YXZ';
  grp.rotation.y = THREE.MathUtils.degToRad(az);
  grp.rotation.x = Math.PI / 2;
  prismGroup.add(grp);
  clockRays.push({ mesh: grp, beam: mesh, len, c1, initY: THREE.MathUtils.degToRad(az) });
}
floorRay(135, 0x9900ff, 0xff00ff, 0.40, 4.00, 1.45);   // HOUR
floorRay(135, 0x1133ff, 0x00aaff, 0.30, 7.77, 1.50);   // MINUTE
floorRay(135, 0xffffff, 0xcccccc, 0.30, 12.56, 1.20);  // SECOND

/* ═══════════════════════════════════════════════════
   PRAYER WINDOW DISCS (simplified — static sectors)
   ═══════════════════════════════════════════════════ */
const DISC_FRAG = `
  uniform float uStartAngle, uEndAngle, uIntensity;
  uniform vec3 uColor1, uColor2;
  varying vec2 vUv;
  void main() {
    vec2 p = vUv * 2.0 - 1.0;
    float r = length(p);
    float theta = atan(p.y, p.x);
    // Radial: ring shape
    float ring = smoothstep(0.06, 0.12, r) * smoothstep(1.0, 0.7, r);
    // Angular sector
    float a = mod(theta - uStartAngle + 6.28318, 6.28318);
    float span = mod(uEndAngle - uStartAngle + 6.28318, 6.28318);
    float inSector = step(0.0, a) * step(a, span);
    float edge = smoothstep(0.0, 0.08, a) * smoothstep(span, span - 0.08, a);
    float t = a / max(span, 0.001);
    vec3 col = mix(uColor1, uColor2, t);
    float falloff = exp(-r * r * 2.2);
    gl_FragColor = vec4(col, ring * edge * inSector * falloff * uIntensity);
  }
`;
const DISC_VERT = `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`;

function mkDisc(startAng, endAng, c1, c2, intensity, y) {
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uStartAngle: { value: startAng },
      uEndAngle: { value: endAng },
      uIntensity: { value: intensity },
      uColor1: { value: new THREE.Color(c1) },
      uColor2: { value: new THREE.Color(c2) },
    },
    vertexShader: DISC_VERT, fragmentShader: DISC_FRAG,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
  });
  const mesh = new THREE.Mesh(new THREE.CircleGeometry(9.12, 128), mat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.y = y;
  scene.add(mesh);
  return mesh;
}
// Current prayer window (approximate — Isha-like sector)
const prayerDisc = mkDisc(-1.2, -0.3, 0x1166ff, 0x55ccff, 0.8, 0.02);
const nextDisc = mkDisc(-0.3, 0.5, 0x8811ff, 0xdd77ff, 0.4, 0.015);

/* ═══════════════════════════════════════════════════
   TAWAF PILGRIM PARTICLES
   ═══════════════════════════════════════════════════ */
const PILGRIM_COUNT = 800;
const pilgrimData = [];

// Use Points (GPU particles) for performance + glow appearance
const pilgrimPositions = new Float32Array(PILGRIM_COUNT * 3);
const pilgrimSizes = new Float32Array(PILGRIM_COUNT);
const pilgrimColors = new Float32Array(PILGRIM_COUNT * 3);

const pilgrimGeo = new THREE.BufferGeometry();
pilgrimGeo.setAttribute('position', new THREE.BufferAttribute(pilgrimPositions, 3));
pilgrimGeo.setAttribute('size', new THREE.BufferAttribute(pilgrimSizes, 1));
pilgrimGeo.setAttribute('color', new THREE.BufferAttribute(pilgrimColors, 3));

const pilgrimMat = new THREE.ShaderMaterial({
  uniforms: {
    uPixelRatio: { value: dpr },
  },
  vertexShader: `
    attribute float size;
    attribute vec3 color;
    varying vec3 vColor;
    uniform float uPixelRatio;
    void main() {
      vColor = color;
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * uPixelRatio * (300.0 / -mvPos.z);
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    void main() {
      vec2 c = gl_PointCoord - 0.5;
      float d = length(c);
      // Soft glowing dot
      float alpha = smoothstep(0.5, 0.1, d);
      float glow = exp(-d * d * 8.0);
      gl_FragColor = vec4(vColor * (0.7 + 0.3 * glow), alpha * 0.9);
    }
  `,
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});

const pilgrimPoints = new THREE.Points(pilgrimGeo, pilgrimMat);
scene.add(pilgrimPoints);

// Initialize pilgrim orbital data
// Multiple rings: inner dense (slow), outer sparse (faster)
// Radii: 1.2 to 6.0 — around the cube at ground level
for (let i = 0; i < PILGRIM_COUNT; i++) {
  // Distribute across rings with strong inner density bias
  const ringT = Math.pow(Math.random(), 1.4); // heavy bias toward inner
  const radius = 1.1 + ringT * 5.0; // 1.1 to 6.1

  // Inner = slower, outer = faster (like real tawaf)
  const baseSpeed = 0.05 + ringT * 0.22; // rad/s

  const angle = Math.random() * TAU;

  // Ground level — pilgrims at cube base, slight height variation for depth
  const y = 0.02 + Math.random() * 0.25;

  // Size: small but visible — flowing stream of light
  const size = 0.18 + (1.0 - ringT) * 0.25 + Math.random() * 0.12;

  const wobbleAmp = 0.01 + Math.random() * 0.04;
  const wobbleFreq = 1.5 + Math.random() * 3.0;
  const wobblePhase = Math.random() * TAU;

  pilgrimData.push({ radius, angle, speed: baseSpeed, y, size, wobbleAmp, wobbleFreq, wobblePhase });

  // Color: bright warm white/cream — stream of sacred light
  const warmth = 0.92 + Math.random() * 0.08;
  pilgrimColors[i * 3] = warmth * 1.1;
  pilgrimColors[i * 3 + 1] = warmth * 1.0;
  pilgrimColors[i * 3 + 2] = warmth * 0.82;
  pilgrimSizes[i] = size;
}
pilgrimGeo.attributes.color.needsUpdate = true;
pilgrimGeo.attributes.size.needsUpdate = true;

/* ═══════════════════════════════════════════════════
   RECT LIGHT UNIFORM UPDATER
   ═══════════════════════════════════════════════════ */
const _rlu_pos = new THREE.Vector3();
const _rlu_hw = new THREE.Vector3();
const _rlu_hh = new THREE.Vector3();
function updateRectLightUniform(light) {
  _rlu_pos.setFromMatrixPosition(light.matrixWorld);
  _rlu_hw.set(light.width / 2, 0, 0).applyMatrix4(light.matrixWorld).sub(_rlu_pos);
  _rlu_hh.set(0, light.height / 2, 0).applyMatrix4(light.matrixWorld).sub(_rlu_pos);
  cubeMat.uniforms.uRect0Pos.value.copy(_rlu_pos);
  cubeMat.uniforms.uRect0HW.value.copy(_rlu_hw);
  cubeMat.uniforms.uRect0HH.value.copy(_rlu_hh);
  cubeMat.uniforms.uRect0Color.value.copy(light.color).multiplyScalar(light.intensity);
}

/* ═══════════════════════════════════════════════════
   RENDER LOOP
   ═══════════════════════════════════════════════════ */
const startTime = performance.now();

function animate() {
  requestAnimationFrame(animate);

  const t = (performance.now() - startTime) / 1000;
  const now = new Date();
  const h = (now.getHours() % 12) + now.getMinutes()/60 + now.getSeconds()/3600;
  const m = now.getMinutes() + now.getSeconds()/60 + now.getMilliseconds()/60000;
  const s = now.getSeconds() + now.getMilliseconds()/1000;

  // Update time uniforms
  cubeMat.uniforms.uTime.value = t;
  fogLayerMat.uniforms.uTime.value = t;
  warmFogMat.uniforms.uTime.value = t;

  // Clock hands
  clockRays[0].mesh.rotation.y = clockRays[0].initY - (h / 12) * TAU;
  clockRays[1].mesh.rotation.y = clockRays[1].initY - (m / 60) * TAU;
  clockRays[2].mesh.rotation.y = clockRays[2].initY - (s / 60) * TAU;

  // Specular highlight orbits at second-hand speed
  const secAngle = (s / 60) * TAU;
  const specRadius = 3.0;
  cubeMat.uniforms.uSpecLightPos.value.set(
    Math.sin(secAngle) * specRadius,
    3.5,
    -Math.cos(secAngle) * specRadius
  );

  // Camera
  cubeMat.uniforms.uCamWorldPos.value.copy(camera.position);

  // ── UPDATE TAWAF PILGRIMS ──
  // Counterclockwise orbit (negative angle increment)
  const pos = pilgrimGeo.attributes.position.array;
  for (let i = 0; i < PILGRIM_COUNT; i++) {
    const p = pilgrimData[i];
    p.angle -= p.speed * (1/60); // CCW

    const wobble = Math.sin(t * p.wobbleFreq + p.wobblePhase) * p.wobbleAmp;
    const r = p.radius + wobble;

    pos[i * 3]     = Math.cos(p.angle) * r;
    pos[i * 3 + 1] = p.y;
    pos[i * 3 + 2] = Math.sin(p.angle) * r;
  }
  pilgrimGeo.attributes.position.needsUpdate = true;

  // ── FBO PASS (capture scene without cube or pilgrims) ──
  cubeMesh.visible = false;
  pilgrimPoints.visible = false;
  renderer.setRenderTarget(fboRT);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);

  // ── MAIN PASS (render with cube + refracted FBO + pilgrims) ──
  cubeMesh.visible = true;
  pilgrimPoints.visible = true;
  cubeMat.uniforms.uScene.value = fboRT.texture;
  updateRectLightUniform(plinthRect);
  renderer.render(scene, camera);
}

animate();
</script>
